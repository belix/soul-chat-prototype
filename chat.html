<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Soul Chat — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F4EFE7;
    --cream-2:#EFE7DA;
    --ink:#2C2822;
    --ink-soft:#7A7266;
    --gold:#BE9A6E;
    --gold-deep:#A6835B;
    --gold-glow:rgba(190,154,110,.45);
    --bot:#FFFFFF;
    --shadow:rgba(66,52,33,.10);
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    background:#E7DECF;
    background:radial-gradient(circle at 50% 0%,#EFE6D7 0%,#E1D6C2 100%);
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);
  }

  /* Phone frame on desktop, full-screen on mobile */
  .phone{
    position:relative;width:100%;max-width:440px;height:100dvh;
    background:var(--cream);overflow:hidden;
    display:flex;flex-direction:column;
    isolation:isolate;
  }
  @media(min-width:600px){
    .phone{height:min(920px,94dvh);border-radius:42px;
      box-shadow:0 40px 90px -30px rgba(60,45,25,.55),0 0 0 1px rgba(255,255,255,.4) inset;}
  }

  /* Breathing ambient background */
  .ambient{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .ambient::before,.ambient::after{
    content:"";position:absolute;border-radius:50%;filter:blur(46px);
  }
  .ambient::before{
    width:120%;height:60%;left:-10%;top:-18%;
    background:radial-gradient(circle,rgba(214,182,138,.55),transparent 66%);
    animation:breatheBg 11s ease-in-out infinite;
  }
  .ambient::after{
    width:120%;height:55%;left:-10%;bottom:-20%;
    background:radial-gradient(circle,rgba(224,205,178,.6),transparent 66%);
    animation:breatheBg 11s ease-in-out infinite 1.6s;
  }
  @keyframes breatheBg{
    0%,100%{transform:scale(1) translateY(0);opacity:.75}
    50%{transform:scale(1.18) translateY(2%);opacity:1}
  }

  /* Header */
  header{
    position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
    gap:10px;
  }
  .h-side{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;color:var(--ink-soft);cursor:pointer;transition:.2s;flex:0 0 auto}
  .h-side:hover{background:rgba(255,255,255,.55);color:var(--ink)}
  .h-side svg{width:19px;height:19px}
  .h-center{display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1}
  .h-title{font-family:var(--serif);font-size:17px;font-weight:600;letter-spacing:.2px}
  .h-status{font-size:11px;color:var(--ink-soft);height:12px;transition:.3s;letter-spacing:.2px}
  .orb-mini{width:24px;height:24px;border-radius:50%;margin-bottom:5px;
    background:radial-gradient(circle at 35% 30%,#fff,var(--gold) 55%,var(--gold-deep));
    box-shadow:0 0 0 4px rgba(190,154,110,.14),0 0 18px 3px var(--gold-glow);
    animation:orbBreathe 6s ease-in-out infinite}
  @keyframes orbBreathe{0%,100%{transform:scale(1);box-shadow:0 0 0 4px rgba(190,154,110,.12),0 0 14px 2px var(--gold-glow)}
    50%{transform:scale(1.14);box-shadow:0 0 0 7px rgba(190,154,110,.18),0 0 26px 6px var(--gold-glow)}}

  /* Progress dots */
  .progress{position:relative;z-index:3;display:flex;gap:7px;justify-content:center;padding:2px 0 10px}
  .progress i{width:20px;height:3px;border-radius:2px;background:rgba(120,105,80,.2);transition:.5s}
  .progress i.done{background:var(--gold)}
  .progress i.active{background:var(--gold);box-shadow:0 0 8px var(--gold-glow)}

  /* Messages */
  .stream{position:relative;z-index:2;flex:1;overflow-y:auto;padding:8px 18px 6px;
    display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
  .stream::-webkit-scrollbar{width:0}

  .row{display:flex;width:100%}
  .row.bot{justify-content:flex-start}
  .row.me{justify-content:flex-end}

  .bubble{max-width:80%;padding:12px 16px;border-radius:20px;font-size:16px;line-height:1.5;
    animation:pop .5s cubic-bezier(.2,.8,.2,1) both}
  .bot .bubble{background:var(--bot);color:var(--ink);border-bottom-left-radius:7px;
    font-family:var(--serif);font-weight:400;font-size:17px;
    box-shadow:0 6px 20px -10px var(--shadow),0 1px 0 rgba(255,255,255,.6) inset}
  .me .bubble{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#fff;
    border-bottom-right-radius:7px;font-weight:500;box-shadow:0 8px 20px -10px rgba(166,131,91,.7)}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}

  /* Typing indicator */
  .typing{display:inline-flex;gap:5px;padding:15px 18px;background:var(--bot);
    border-radius:20px;border-bottom-left-radius:7px;box-shadow:0 6px 20px -10px var(--shadow)}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:.5;
    animation:blink 1.4s infinite both}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.35;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

  /* Quick reply chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;padding:2px 0 4px;
    animation:pop .45s cubic-bezier(.2,.8,.2,1) both}
  .chip{font-family:var(--sans);font-size:14.5px;font-weight:500;color:var(--gold-deep);
    background:rgba(255,255,255,.85);border:1.5px solid rgba(190,154,110,.5);
    padding:10px 16px;border-radius:22px;cursor:pointer;transition:.18s;
    box-shadow:0 4px 12px -8px var(--shadow)}
  .chip:hover{background:var(--gold);border-color:var(--gold);color:#fff;transform:translateY(-1px)}
  .chip:active{transform:scale(.96)}

  /* Breathing widget */
  .breath{align-self:center;display:flex;flex-direction:column;align-items:center;gap:16px;
    padding:14px 0 6px;animation:pop .6s both}
  .breath-ring{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,rgba(255,255,255,.9),rgba(224,205,178,.5));
    box-shadow:0 0 0 1px rgba(190,154,110,.3),0 0 40px var(--gold-glow);
    transition:transform 4s ease-in-out;color:var(--gold-deep);font-family:var(--serif);
    font-size:16px;letter-spacing:.5px}
  .breath .go{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--gold-deep);
    background:none;border:none;cursor:pointer;padding:8px 14px;opacity:.85}
  .breath .go:hover{opacity:1;text-decoration:underline}

  /* Reveal soul card */
  .soulcard{align-self:center;max-width:92%;text-align:center;padding:26px 22px;border-radius:24px;
    background:linear-gradient(180deg,#fff,#FBF6EE);
    box-shadow:0 20px 50px -22px rgba(120,90,45,.5),0 0 0 1px rgba(190,154,110,.25);
    animation:bloom .9s cubic-bezier(.2,.8,.2,1) both}
  .soulcard .seal{width:46px;height:46px;border-radius:50%;margin:0 auto 14px;
    background:radial-gradient(circle at 35% 30%,#fff,var(--gold) 55%,var(--gold-deep));
    box-shadow:0 0 26px 6px var(--gold-glow)}
  .soulcard p{font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--ink)}
  .soulcard .sig{margin-top:14px;font-family:var(--sans);font-size:12px;letter-spacing:2px;
    text-transform:uppercase;color:var(--gold-deep);opacity:.8}
  @keyframes bloom{from{opacity:0;transform:translateY(16px) scale(.94)}to{opacity:1;transform:none}}

  /* CTA card */
  .cta{align-self:stretch;padding:20px;border-radius:24px;background:rgba(255,255,255,.72);
    backdrop-filter:blur(4px);box-shadow:0 12px 34px -18px var(--shadow),0 0 0 1px rgba(255,255,255,.5) inset;
    animation:pop .6s both;text-align:center}
  .cta h3{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:6px}
  .cta p{font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:14px}
  .cta input{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(190,154,110,.4);
    font-family:var(--sans);font-size:15px;color:var(--ink);background:#fff;margin-bottom:10px;outline:none}
  .cta input:focus{border-color:var(--gold)}
  .cta button{width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;
    font-family:var(--sans);font-size:15px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,var(--gold),var(--gold-deep));
    box-shadow:0 12px 26px -12px rgba(166,131,91,.9);transition:.2s}
  .cta button:hover{transform:translateY(-2px);box-shadow:0 16px 30px -12px rgba(166,131,91,1)}
  .cta button:active{transform:scale(.98)}
  .cta small{display:block;margin-top:10px;font-size:11px;color:var(--ink-soft)}

  /* Input bar */
  .bar{position:relative;z-index:3;display:flex;align-items:center;gap:9px;
    padding:10px 14px calc(env(safe-area-inset-bottom) + 14px);
    background:linear-gradient(180deg,rgba(244,239,231,0),var(--cream) 34%)}
  .bar.hidden{opacity:.35;pointer-events:none}
  .field{flex:1;display:flex;align-items:center;background:#fff;border:1.5px solid rgba(190,154,110,.45);
    border-radius:26px;padding:5px 6px 5px 18px;box-shadow:0 6px 18px -12px var(--shadow);transition:.2s}
  .field:focus-within{border-color:var(--gold);box-shadow:0 6px 22px -10px var(--gold-glow)}
  .field input{flex:1;border:none;outline:none;font-family:var(--sans);font-size:15.5px;
    color:var(--ink);background:none;padding:9px 0}
  .field input::placeholder{color:#B4AA99}
  .icon-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;transition:.2s}
  .mic{background:#F0E8DA;color:var(--gold-deep)}
  .mic:hover{background:#E9DEC9}
  .mic.pulse{animation:micPulse 1s ease infinite}
  @keyframes micPulse{0%,100%{box-shadow:0 0 0 0 var(--gold-glow)}50%{box-shadow:0 0 0 8px transparent}}
  .send{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#fff;
    box-shadow:0 8px 18px -8px rgba(166,131,91,.9)}
  .send:hover{transform:translateY(-1px)}
  .send:active{transform:scale(.94)}
  .icon-btn svg{width:19px;height:19px}

  .hint{position:absolute;bottom:78px;right:16px;background:var(--ink);color:#fff;font-size:12px;
    padding:8px 12px;border-radius:12px;opacity:0;transform:translateY(6px);pointer-events:none;
    transition:.25s;z-index:5;max-width:210px}
  .hint.show{opacity:1;transform:none}

  /* sparkles */
  .spark{position:absolute;z-index:6;pointer-events:none;font-size:14px;
    animation:rise 2.4s ease-out forwards}
  @keyframes rise{0%{opacity:0;transform:translateY(0) scale(.4)}
    15%{opacity:1}100%{opacity:0;transform:translateY(-160px) scale(1.1)}}
</style>
</head>
<body>
<div class="phone">
  <div class="ambient"></div>

  <header>
    <div class="h-side" id="restart" title="Neu starten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    </div>
    <div class="h-center">
      <div class="orb-mini"></div>
      <div class="h-title">Soul Chat</div>
      <div class="h-status" id="status">ist bei dir</div>
    </div>
    <div class="h-side" id="sound" title="Ton an / aus">
      <svg id="sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
    </div>
  </header>

  <div class="progress" id="progress"></div>
  <div class="stream" id="stream"></div>

  <div class="hint" id="hint">Voice-Input ist im echten Soul Chat verfügbar ✨</div>

  <div class="bar hidden" id="bar">
    <button class="icon-btn mic" id="mic" title="Sprechen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 19v3"/></svg>
    </button>
    <div class="field">
      <input id="input" type="text" placeholder="Deine Antwort" autocomplete="off" />
    </div>
    <button class="icon-btn send" id="send" title="Senden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
    </button>
  </div>
</div>

<script>
/* ---------- elements ---------- */
const stream = document.getElementById('stream');
const bar = document.getElementById('bar');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const micBtn = document.getElementById('mic');
const statusEl = document.getElementById('status');
const progressEl = document.getElementById('progress');
const hint = document.getElementById('hint');
const phone = document.querySelector('.phone');

/* ---------- state ---------- */
const answers = {};
let inputResolver = null;
let soundOn = true;

/* ---------- helpers ---------- */
const sleep = ms => new Promise(r => setTimeout(r, ms));
const scrollDown = () => { stream.scrollTop = stream.scrollHeight; };

function setStatus(t){ statusEl.textContent = t; }

/* progress */
const STAGES = ['Ankommen','Fühlen','Dein Thema','Loslassen','Deine Botschaft'];
STAGES.forEach(() => { const i = document.createElement('i'); progressEl.appendChild(i); });
function setStage(n){ // 1-based
  [...progressEl.children].forEach((d,idx) => {
    d.className = idx < n-1 ? 'done' : idx === n-1 ? 'active' : '';
  });
}

/* soft chime via Web Audio */
let actx;
function chime(){
  if(!soundOn) return;
  try{
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const t = actx.currentTime;
    [[587,0],[784,.09]].forEach(([f,dl]) => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,t+dl);
      g.gain.linearRampToValueAtTime(.05,t+dl+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+dl+.5);
      o.connect(g).connect(actx.destination); o.start(t+dl); o.stop(t+dl+.55);
    });
  }catch(e){}
}
function buzz(){ if(navigator.vibrate) navigator.vibrate(8); }

/* messages */
function addBot(text){
  const row = document.createElement('div'); row.className='row bot';
  const b = document.createElement('div'); b.className='bubble'; b.textContent=text;
  row.appendChild(b); stream.appendChild(row); scrollDown(); chime();
}
function addMe(text){
  const row = document.createElement('div'); row.className='row me';
  const b = document.createElement('div'); b.className='bubble'; b.textContent=text;
  row.appendChild(b); stream.appendChild(row); scrollDown();
}

async function botSay(text){
  setStatus('schreibt …');
  const row = document.createElement('div'); row.className='row bot';
  row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  stream.appendChild(row); scrollDown();
  const dur = Math.min(2200, Math.max(750, text.length*34));
  await sleep(dur);
  row.remove();
  addBot(text);
  setStatus('ist bei dir');
  await sleep(340);
}

/* free-text input */
function awaitText(placeholder){
  input.placeholder = placeholder || 'Deine Antwort';
  bar.classList.remove('hidden');
  input.focus();
  return new Promise(res => { inputResolver = res; });
}
function submitText(){
  if(!inputResolver) return;
  const v = input.value.trim();
  if(!v) return;
  const res = inputResolver; inputResolver = null;
  input.value=''; bar.classList.add('hidden'); input.blur();
  addMe(v); buzz();
  res(v);
}
sendBtn.addEventListener('click', submitText);
input.addEventListener('keydown', e => { if(e.key==='Enter') submitText(); });

/* chips */
function awaitChips(options){
  return new Promise(res => {
    const wrap = document.createElement('div'); wrap.className='chips';
    options.forEach(opt => {
      const c = document.createElement('button'); c.className='chip'; c.textContent=opt.label;
      c.onclick = () => { wrap.remove(); addMe(opt.label); buzz(); res(opt); };
      wrap.appendChild(c);
    });
    stream.appendChild(wrap); scrollDown();
  });
}

/* breathing moment */
function breathe(){
  return new Promise(res => {
    const w = document.createElement('div'); w.className='breath';
    const ring = document.createElement('div'); ring.className='breath-ring'; ring.textContent='Einatmen';
    const go = document.createElement('button'); go.className='go'; go.textContent='Ich bin bereit →';
    w.appendChild(ring); w.appendChild(go); stream.appendChild(w); scrollDown();
    const phases = [
      {t:'Einatmen …', s:1.32, d:4000},
      {t:'Halten',     s:1.32, d:1800},
      {t:'Ausatmen …', s:1,    d:6000}
    ];
    let i=0, timer;
    function step(){
      const p = phases[i % phases.length];
      ring.textContent = p.t;
      ring.style.transitionDuration = (p.d/1000)+'s';
      ring.style.transform = 'scale('+p.s+')';
      timer = setTimeout(() => { i++; step(); }, p.d);
    }
    step();
    go.onclick = () => { clearTimeout(timer); w.remove(); res(); };
  });
}

/* maps for the reveal */
const MOOD = {
  erschoepft:'mit wenig Kraft an',
  unruhig:'mit einer leisen Unruhe an',
  okay:'ziemlich ausgeglichen an',
  vorfreude:'voller Vorfreude an',
  unklar:'und weißt selbst noch nicht so genau, wie'
};
const FOCUS = {
  beziehung:'das Thema Nähe und Beziehung',
  berufung:'die Frage nach deiner Berufung',
  selbstwert:'dein Verhältnis zu dir selbst',
  ruhe:'die Sehnsucht nach mehr innerer Ruhe',
  neues:'der Wunsch, etwas Neues zu wagen'
};

/* sparkle burst */
function sparkles(){
  const em = ['✨','·','✦','˚','✧'];
  for(let k=0;k<16;k++){
    const s = document.createElement('div'); s.className='spark';
    s.textContent = em[k%em.length];
    s.style.left = (20+Math.random()*60)+'%';
    s.style.bottom = (20+Math.random()*30)+'%';
    s.style.animationDelay = (Math.random()*.5)+'s';
    s.style.fontSize = (10+Math.random()*14)+'px';
    phone.appendChild(s);
    setTimeout(()=>s.remove(), 3000);
  }
}

/* ---------- the conversation ---------- */
async function run(){
  // reset
  stream.innerHTML=''; Object.keys(answers).forEach(k=>delete answers[k]);
  bar.classList.add('hidden');

  setStage(1);
  await sleep(500);
  await botSay('Schön, dass du hier bist.');
  await botSay('Atme einmal tief durch. Der Alltag kann eine Minute warten.');
  await botSay('Wie heißt du?');
  answers.name = await awaitText('Dein Name');

  await sleep(200);
  await botSay('Schön, dich kennenzulernen, ' + answers.name + '.');

  setStage(2);
  await botSay('Wie fühlst du dich gerade, ganz ehrlich?');
  const mood = await awaitChips([
    {label:'Erschöpft', key:'erschoepft'},
    {label:'Unruhig', key:'unruhig'},
    {label:'Ganz okay', key:'okay'},
    {label:'Voller Vorfreude', key:'vorfreude'},
    {label:'Weiß nicht genau', key:'unklar'}
  ]);
  answers.mood = mood.key;
  await botSay('Danke, dass du so ehrlich bist. Das darf gerade alles da sein.');

  setStage(3);
  await botSay('Was beschäftigt dich in diesen Tagen am meisten?');
  const focus = await awaitChips([
    {label:'Beziehungen', key:'beziehung'},
    {label:'Beruf & Berufung', key:'berufung'},
    {label:'Selbstwert', key:'selbstwert'},
    {label:'Innere Ruhe', key:'ruhe'},
    {label:'Etwas Neues wagen', key:'neues'}
  ]);
  answers.focus = focus.key;
  await botSay('Ich spüre, dass da gerade viel Bewegung in dir ist.');

  setStage(4);
  await botSay('Wenn du diese Woche eine Sache loslassen dürftest, was wäre das?');
  answers.release = await awaitText('Schreib es einfach auf …');
  await botSay('Das auszusprechen ist schon der erste Schritt.');

  await botSay('Lass uns kurz zusammen atmen, bevor ich dir etwas mitgebe.');
  await breathe();

  setStage(5);
  await botSay('Danke. Ich habe gehört, was du gesagt hast.');
  await sleep(300);

  // reveal card
  const moodP = MOOD[answers.mood] || 'so, wie es gerade ist';
  const focusP = FOCUS[answers.focus] || 'das, was dich innerlich bewegt';
  const card = document.createElement('div'); card.className='soulcard';
  card.innerHTML =
    '<div class="seal"></div>' +
    '<p>' + answers.name + ', du kommst gerade ' + moodP + '. ' +
    'Tief in dir bewegt dich ' + focusP + '. Und du bist bereit, ' +
    (answers.release ? '„' + answers.release + '"' : 'etwas Altes') + ' loszulassen.<br><br>' +
    'Das braucht Mut. Und du bist schon mittendrin.</p>' +
    '<div class="sig">Deine Seele</div>';
  stream.appendChild(card); scrollDown(); chime(); sparkles();
  await sleep(1400);

  await botSay('Ich habe vier kleine Impulse für dich vorbereitet, über die nächsten sieben Tage. Genau für diesen Moment.');

  // CTA
  const cta = document.createElement('div'); cta.className='cta';
  cta.innerHTML =
    '<h3>Deine 7-Tage Soul-Reise</h3>' +
    '<p>Vier persönliche E-Mails, sanft dosiert. Die erste ist heute noch bei dir.</p>' +
    '<input type="email" placeholder="Deine E-Mail-Adresse" />' +
    '<button>Meine Soul-Reise beginnen ✨</button>' +
    '<small>Kostenlos. Jederzeit abbestellbar.</small>';
  stream.appendChild(cta); scrollDown();
  cta.querySelector('button').onclick = async () => {
    sparkles(); chime(); buzz();
    cta.innerHTML = '<div class="seal" style="margin-bottom:14px"></div>' +
      '<h3>Bis gleich, ' + answers.name + '.</h3>' +
      '<p style="margin-top:8px">Deine erste Botschaft ist auf dem Weg zu dir. Atme. Du bist genau richtig.</p>';
    scrollDown();
  };
}

/* ---------- controls ---------- */
document.getElementById('restart').onclick = () => run();
document.getElementById('sound').onclick = function(){
  soundOn = !soundOn;
  this.style.opacity = soundOn ? '1' : '.4';
  if(soundOn) chime();
};
let hintTimer;
micBtn.onclick = () => {
  micBtn.classList.add('pulse');
  hint.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => { hint.classList.remove('show'); micBtn.classList.remove('pulse'); }, 2200);
};

run();
</script>
</body>
</html>
